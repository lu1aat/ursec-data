name: Regenerar índice

on:
  push:
    branches: [main]
    paths:
      - 'db/files.csv'
      - 'web.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar index
        run: python3 web.py

      - name: Commit docs/index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: regenerar índice [skip ci]"
          git push
